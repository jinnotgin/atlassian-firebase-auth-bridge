name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/atlassian-firebase-auth-bridge

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          IMAGE="${IMAGE_NAME,,}"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            VERSION="pr-${{ github.event.pull_request.number }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::12}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "arch_tag=${IMAGE}:${VERSION}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for PR
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          load: false
          tags: ${{ steps.meta.outputs.arch_tag }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Build and push arch image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ steps.meta.outputs.arch_tag }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    name: Create multi-arch manifest
    needs:
      - build
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'

    steps:
      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          IMAGE="${IMAGE_NAME,,}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::12}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "also_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "also_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create version manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}-amd64" \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}-arm64"

      - name: Create Docker Hub version manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            -t "${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}" \
            "${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}-amd64" \
            "${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}-arm64"

      - name: Create latest manifest
        if: steps.meta.outputs.also_latest == 'true'
        shell: bash
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.image }}:latest" \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}-amd64" \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}-arm64"

      - name: Create Docker Hub latest manifest
        if: steps.meta.outputs.also_latest == 'true'
        shell: bash
        run: |
          docker buildx imagetools create \
            -t "${{ env.DOCKERHUB_IMAGE }}:latest" \
            "${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}-amd64" \
            "${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}-arm64"
